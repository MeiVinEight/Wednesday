<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8">
		<link rel="icon" href="favicon.ico" type="image/x-icon">
		<link rel="stylesheet" href="css/login.css">
		<link rel="stylesheet" href="css/index.css">
		<link rel="stylesheet" href="css/popup.css">
		<script src="script/crypto-js.min.js"></script>
		<title>Wednesday - 登录</title>
	</head>
	<body style="margin: 0; padding: 0;">
		<div id="popup-container">
		</div>
		<div style="height: 100vh; width: min-content; margin: 0 auto; display: flex;">
			<div class="login-box">
				<div style="display: inline-block; align-items: center; justify-content: center; height: min-content; width: 100%;">
					<div id="login-box-head">
						<img id="login-box-head-icon" src="favicon.png" alt="Wednesday" style="height: 5em;">
						<span>Wednesday</span>
					</div>
					<div style="margin: 24px 40px 0 40px; padding: 24px 0; height: min-content;">
						<div class="input-box input-box-color">
							<div style="display: inline-flex; width: 100%; align-items: center">
								<svg style="color: #93A2B780; flex-shrink: 0" stroke="currentColor" viewBox="0 0 512 512" height="1em" width="1em">
									<path fill="none" stroke-linejoin="round" stroke-width="32" d="M218.1 167.17c0 13 0 25.6 4.1 37.4-43.1 50.6-156.9 184.3-167.5 194.5a20.17 20.17 0 0 0-6.7 15c0 8.5 5.2 16.7 9.6 21.3 6.6 6.9 34.8 33 40 28 15.4-15 18.5-19 24.8-25.2 9.5-9.3-1-28.3 2.3-36s6.8-9.2 12.5-10.4 15.8 2.9 23.7 3c8.3.1 12.8-3.4 19-9.2 5-4.6 8.6-8.9 8.7-15.6.2-9-12.8-20.9-3.1-30.4s23.7 6.2 34 5 22.8-15.5 24.1-21.6-11.7-21.8-9.7-30.7c.7-3 6.8-10 11.4-11s25 6.9 29.6 5.9c5.6-1.2 12.1-7.1 17.4-10.4 15.5 6.7 29.6 9.4 47.7 9.4 68.5 0 124-53.4 124-119.2S408.5 48 340 48s-121.9 53.37-121.9 119.17zM400 144a32 32 0 1 1-32-32 32 32 0 0 1 32 32z"></path>
								</svg>
								<input type="password" value name="password" class="input-box-input" id="input-box-input" placeholder="请输入Token" onfocus="focusInputBox(event)" onblur="blurInputBox(event)"/>
							</div>
						</div>
					</div>
					<div id="login-box-passwd-label">
						<label for="input-box-input">💡 提示: 初次登录请在 Wednesday 启动日志中查看登录密钥</label>
					</div>
					<button class="floating-button" style="width: 360px; margin: 40px auto 0 auto;" onclick="login()" onmousedown="mousedownFloatingButton(event)" onmouseup="mouseupFloatingButton(event)">登录</button>
				</div>
			</div>
		</div>
		<div id="popup-window-temp" class="popup-window">
			<div class="popup-icon0"></div>
			<div class="popup-text"></div>
		</div>
	</body>
	<script src="script/login.js"></script>
	<script src="script/index.js"></script>
	<script src="script/popup.js"></script>
</html>
